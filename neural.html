<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Backpropagation Canvas</title>
    <style>
        :root {
            --bg-dark: #0f0f1a;
            --panel-bg: #1e1e2f;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --color-input: #3b82f6;
            /* Blue */
            --color-hidden: #a855f7;
            /* Purple */
            --color-output: #f97316;
            /* Orange */
            --color-loss: #ef4444;
            /* Red */
            --color-active: #fde047;
            /* Bright Yellow */
            --color-forward: #3b82f6;
            /* Blue border for forward */
            --color-backward: #f97316;
            /* Orange/Red border for backward */
            --color-update: #22c55e;
            /* Green border for update */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Top Panel: Graph */
        #top-panel {
            flex: 6;
            display: flex;
            flex-direction: column;
            position: relative;
            min-height: 50vh;
            border-bottom: 2px solid #2a2a40;
        }

        #controls {
            padding: 15px 20px;
            background-color: #131320;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2a40;
            flex-wrap: wrap;
            gap: 10px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        button {
            background-color: #2a2a40;
            color: white;
            border: 1px solid #3f3f5a;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        button:hover {
            background-color: #3f3f5a;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .play-btn {
            background-color: var(--color-update);
            border-color: #16a34a;
        }

        .play-btn:hover {
            background-color: #16a34a;
        }

        .status-area {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .phase-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            background-color: var(--panel-bg);
            border: 1px solid #3f3f5a;
        }

        #progress-container {
            width: 100%;
            height: 4px;
            background-color: #2a2a40;
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background-color: var(--color-active);
            transition: width 0.3s ease;
        }

        #svg-container {
            flex: 1;
            width: 100%;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #151525;
        }

        svg {
            width: 100%;
            height: 100%;
            min-width: 900px;
        }

        /* SVG Element Styles */
        .node {
            transition: all 0.3s ease;
            stroke: var(--bg-dark);
            stroke-width: 4px;
        }

        .node-text {
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            fill: white;
            font-weight: bold;
            pointer-events: none;
        }

        .node-label {
            font-size: 16px;
            fill: var(--text-main);
            font-weight: bold;
            pointer-events: none;
        }

        .edge {
            stroke: #3f3f5a;
            stroke-width: 2px;
            transition: all 0.3s ease;
        }

        .edge:hover {
            stroke: #6b7280;
            stroke-width: 4px;
        }

        .edge-label {
            font-size: 12px;
            fill: #475569;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            pointer-events: none;
            transition: all 0.3s ease;
            text-shadow: 0 0 4px var(--bg-dark), 0 0 4px var(--bg-dark);
        }

        /* Active states */
        .node.active {
            stroke: var(--color-active);
            stroke-width: 5px;
            filter: drop-shadow(0 0 10px var(--color-active));
            animation: pulse 1.5s infinite;
        }

        .edge.active {
            stroke: var(--color-active);
            stroke-width: 4px;
            filter: drop-shadow(0 0 5px var(--color-active));
        }

        .edge-label.active {
            fill: var(--color-active);
            font-size: 16px;
            text-shadow: 0 0 8px #000;
            z-index: 10;
        }

        @keyframes pulse {
            0% {
                filter: drop-shadow(0 0 5px var(--color-active));
            }

            50% {
                filter: drop-shadow(0 0 15px var(--color-active));
            }

            100% {
                filter: drop-shadow(0 0 5px var(--color-active));
            }
        }

        /* Bottom Panel: Step Details */
        #bottom-panel {
            flex: 4;
            background-color: var(--bg-dark);
            padding: 20px;
            overflow-y: auto;
            display: flex;
            justify-content: center;
        }

        .card {
            background-color: var(--panel-bg);
            border-radius: 8px;
            width: 100%;
            max-width: 1000px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            border-left: 5px solid transparent;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .card.forward {
            border-left-color: var(--color-forward);
        }

        .card.backward {
            border-left-color: var(--color-backward);
        }

        .card.update {
            border-left-color: var(--color-update);
        }

        .step-title {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .forward .step-title {
            color: #60a5fa;
        }

        .backward .step-title {
            color: #fb923c;
        }

        .update .step-title {
            color: #4ade80;
        }

        .math-line {
            font-family: 'Courier New', Courier, monospace;
            background-color: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-size: 1.15rem;
            color: #cbd5e1;
            line-height: 1.6;
        }

        .math-line .sub {
            color: #94a3b8;
            font-size: 1.05rem;
            margin-top: 8px;
            display: block;
            border-top: 1px dashed #3f3f5a;
            padding-top: 8px;
        }

        .math-result {
            font-size: 1.3rem;
            font-weight: bold;
            color: white;
            margin-top: 12px;
            display: block;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px;
            border-radius: 4px;
        }

        .forward .math-result {
            color: #93c5fd;
        }

        .backward .math-result {
            color: #fdba74;
        }

        .update .math-result {
            color: #86efac;
        }

        .logic-text {
            margin-top: 15px;
            font-size: 1.05rem;
            color: var(--text-muted);
            line-height: 1.6;
            padding-top: 15px;
            border-top: 1px solid #3f3f5a;
        }

        .logic-text b {
            color: #e2e8f0;
        }

        .logic-text i {
            color: #a78bfa;
        }

        /* Accent for math concepts */

        .active-nodes-info {
            margin-top: 10px;
            font-size: 0.95rem;
            color: var(--color-active);
            font-weight: bold;
        }

        /* Highlight box for vanishing gradient */
        .highlight-box {
            margin-top: 20px;
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.4);
            padding: 15px;
            border-radius: 6px;
            color: #fca5a5;
            font-size: 1.05rem;
            line-height: 1.5;
        }

        .highlight-box strong {
            color: #f87171;
            display: block;
            margin-bottom: 8px;
        }

        /* Summary Table */
        .summary-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 1rem;
        }

        .summary-table th,
        .summary-table td {
            border: 1px solid #3f3f5a;
            padding: 10px 15px;
            text-align: left;
        }

        .summary-table th {
            background-color: rgba(255, 255, 255, 0.05);
            color: #e2e8f0;
        }

        .summary-table td {
            font-family: 'Courier New', Courier, monospace;
            color: #cbd5e1;
        }

        @media (max-width: 768px) {
            #controls {
                flex-direction: column;
                align-items: stretch;
            }

            .status-area {
                justify-content: space-between;
                margin-top: 10px;
            }

            #svg-container {
                align-items: flex-start;
            }

            .math-line {
                font-size: 0.9rem;
            }

            .math-result {
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>

    <!-- Top Half: Diagram -->
    <div id="top-panel">
        <div id="controls">
            <div class="btn-group">
                <button id="btn-play" class="play-btn">▶ Start</button>
                <button id="btn-pause">⏸ Pause</button>
                <button id="btn-prev">⏮ Prev</button>
                <button id="btn-next">⏭ Next</button>
                <button id="btn-reset">🔄 Reset</button>
            </div>
            <div class="status-area">
                <span id="step-counter" class="phase-badge" style="background: transparent; border: none;">Step 0 /
                    21</span>
                <span id="phase-label" class="phase-badge">Ready</span>
            </div>
        </div>
        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>

        <div id="svg-container">
            <!-- Increased dimensions for spacing -->
            <svg id="network-svg" viewBox="0 0 1200 600" preserveAspectRatio="xMidYMid meet">
                <defs></defs>
                <g id="edges-layer"></g>
                <g id="nodes-layer"></g>
                <g id="labels-layer"></g>
            </svg>
        </div>
    </div>

    <!-- Bottom Half: Details Panel -->
    <div id="bottom-panel">
        <div id="step-card" class="card">
            <div id="card-title" class="step-title">Welcome</div>
            <div class="math-line">
                <div id="card-formula">Click 'Start' or 'Next' to begin the animation.</div>
                <div id="card-substituted" class="sub"></div>
                <div id="card-result" class="math-result"></div>
            </div>
            <div id="card-active-nodes" class="active-nodes-info"></div>
            <div id="card-logic" class="logic-text">This will walk through a 4-layer neural network's forward pass,
                backpropagation, and weight update using the <b>multi-variable chain rule</b>.</div>
            <div id="card-extra"></div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. DATA STRUCTURE: Nodes, Edges, Steps
        // ==========================================

        // Increased coordinates to spread out the network
        const networkData = {
            nodes: [
                { id: 'x1', x: 150, y: 200, color: 'var(--color-input)', label: 'x₁', val: '0.500' },
                { id: 'x2', x: 150, y: 400, color: 'var(--color-input)', label: 'x₂', val: '0.300' },

                { id: 'h1_1', x: 450, y: 100, color: 'var(--color-hidden)', label: 'h⁽¹⁾₁', val: '0.000' },
                { id: 'h1_2', x: 450, y: 300, color: 'var(--color-hidden)', label: 'h⁽¹⁾₂', val: '0.000' },
                { id: 'h1_3', x: 450, y: 500, color: 'var(--color-hidden)', label: 'h⁽¹⁾₃', val: '0.000' },

                { id: 'h2_1', x: 750, y: 100, color: 'var(--color-hidden)', label: 'h⁽²⁾₁', val: '0.000' },
                { id: 'h2_2', x: 750, y: 300, color: 'var(--color-hidden)', label: 'h⁽²⁾₂', val: '0.000' },
                { id: 'h2_3', x: 750, y: 500, color: 'var(--color-hidden)', label: 'h⁽²⁾₃', val: '0.000' },

                { id: 'o1', x: 1050, y: 200, color: 'var(--color-output)', label: 'o₁', val: '0.000' },
                { id: 'o2', x: 1050, y: 400, color: 'var(--color-output)', label: 'o₂', val: '0.000' }
            ],
            edges: [
                // W1 (Input -> Hidden 1)
                { id: 'x1-h1_1', src: 'x1', dst: 'h1_1', w: '0.2' }, { id: 'x2-h1_1', src: 'x2', dst: 'h1_1', w: '0.4' },
                { id: 'x1-h1_2', src: 'x1', dst: 'h1_2', w: '0.3' }, { id: 'x2-h1_2', src: 'x2', dst: 'h1_2', w: '0.1' },
                { id: 'x1-h1_3', src: 'x1', dst: 'h1_3', w: '0.5' }, { id: 'x2-h1_3', src: 'x2', dst: 'h1_3', w: '0.2' },
                // W2 (Hidden 1 -> Hidden 2)
                { id: 'h1_1-h2_1', src: 'h1_1', dst: 'h2_1', w: '0.3' }, { id: 'h1_2-h2_1', src: 'h1_2', dst: 'h2_1', w: '0.2' }, { id: 'h1_3-h2_1', src: 'h1_3', dst: 'h2_1', w: '0.4' },
                { id: 'h1_1-h2_2', src: 'h1_1', dst: 'h2_2', w: '0.1' }, { id: 'h1_2-h2_2', src: 'h1_2', dst: 'h2_2', w: '0.5' }, { id: 'h1_3-h2_2', src: 'h1_3', dst: 'h2_2', w: '0.3' },
                { id: 'h1_1-h2_3', src: 'h1_1', dst: 'h2_3', w: '0.4' }, { id: 'h1_2-h2_3', src: 'h1_2', dst: 'h2_3', w: '0.2' }, { id: 'h1_3-h2_3', src: 'h1_3', dst: 'h2_3', w: '0.1' },
                // W3 (Hidden 2 -> Output)
                { id: 'h2_1-o1', src: 'h2_1', dst: 'o1', w: '0.6' }, { id: 'h2_2-o1', src: 'h2_2', dst: 'o1', w: '0.1' }, { id: 'h2_3-o1', src: 'h2_3', dst: 'o1', w: '0.3' },
                { id: 'h2_1-o2', src: 'h2_1', dst: 'o2', w: '0.2' }, { id: 'h2_2-o2', src: 'h2_2', dst: 'o2', w: '0.4' }, { id: 'h2_3-o2', src: 'h2_3', dst: 'o2', w: '0.5' }
            ]
        };

        const stepsData = [
            // --- FORWARD PASS ---
            {
                phase: 'forward',
                title: 'Step 1: Compute Hidden 1 Neuron 1',
                formula: 'z<sub>1</sub><sup>(1)</sup> = W<sub>1</sub><sup>(1)</sup> &middot; [x<sub>1</sub>, x<sub>2</sub>]<br>h<sub>1</sub><sup>(1)</sup> = &sigma;(z<sub>1</sub><sup>(1)</sup>)',
                substituted: 'z<sub>1</sub><sup>(1)</sup> = 0.2 &times; 0.5 + 0.4 &times; 0.3 = 0.10 + 0.12 = 0.220<br>h<sub>1</sub><sup>(1)</sup> = &sigma;(0.220)',
                result: 'h<sub>1</sub><sup>(1)</sup> = 0.5548',
                logic: 'First neuron of Hidden Layer 1. The input vector is dotted with the first row of weight matrix W<sup>(1)</sup>. The pre-activation sum (z) is passed through the <i>Sigmoid</i> function &sigma;(z) = 1 / (1 + e<sup>-z</sup>).',
                activeNodes: ['x1', 'x2', 'h1_1'],
                activeEdges: ['x1-h1_1', 'x2-h1_1'],
                updates: { 'h1_1': '0.5548' }
            },
            {
                phase: 'forward',
                title: 'Step 2: Compute Hidden 1 Neuron 2',
                formula: 'z<sub>2</sub><sup>(1)</sup> = W<sub>2</sub><sup>(1)</sup> &middot; [x<sub>1</sub>, x<sub>2</sub>]<br>h<sub>2</sub><sup>(1)</sup> = &sigma;(z<sub>2</sub><sup>(1)</sup>)',
                substituted: 'z<sub>2</sub><sup>(1)</sup> = 0.3 &times; 0.5 + 0.1 &times; 0.3 = 0.15 + 0.03 = 0.180<br>h<sub>2</sub><sup>(1)</sup> = &sigma;(0.180)',
                result: 'h<sub>2</sub><sup>(1)</sup> = 0.5449',
                logic: 'Second neuron of Hidden Layer 1. Same dot product process using the second row of weights.',
                activeNodes: ['x1', 'x2', 'h1_2'],
                activeEdges: ['x1-h1_2', 'x2-h1_2'],
                updates: { 'h1_2': '0.5449' }
            },
            {
                phase: 'forward',
                title: 'Step 3: Compute Hidden 1 Neuron 3',
                formula: 'z<sub>3</sub><sup>(1)</sup> = W<sub>3</sub><sup>(1)</sup> &middot; [x<sub>1</sub>, x<sub>2</sub>]<br>h<sub>3</sub><sup>(1)</sup> = &sigma;(z<sub>3</sub><sup>(1)</sup>)',
                substituted: 'z<sub>3</sub><sup>(1)</sup> = 0.5 &times; 0.5 + 0.2 &times; 0.3 = 0.25 + 0.06 = 0.310<br>h<sub>3</sub><sup>(1)</sup> = &sigma;(0.310)',
                result: 'h<sub>3</sub><sup>(1)</sup> = 0.5769',
                logic: 'Third neuron of Hidden Layer 1. Note how larger incoming weights result in a larger z value, pushing the activation closer to 1.',
                activeNodes: ['x1', 'x2', 'h1_3'],
                activeEdges: ['x1-h1_3', 'x2-h1_3'],
                updates: { 'h1_3': '0.5769' }
            },
            {
                phase: 'forward',
                title: 'Step 4: Compute Hidden 2 Neuron 1',
                formula: 'z<sub>1</sub><sup>(2)</sup> = W<sub>1</sub><sup>(2)</sup> &middot; [h<sub>1</sub><sup>(1)</sup>, h<sub>2</sub><sup>(1)</sup>, h<sub>3</sub><sup>(1)</sup>]<br>h<sub>1</sub><sup>(2)</sup> = &sigma;(z<sub>1</sub><sup>(2)</sup>)',
                substituted: 'z<sub>1</sub><sup>(2)</sup> = 0.3 &times; 0.5548 + 0.2 &times; 0.5449 + 0.4 &times; 0.5769<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;= 0.1664 + 0.1090 + 0.2308 = 0.5062',
                result: 'h<sub>1</sub><sup>(2)</sup> = 0.6240',
                logic: 'Moving to Hidden Layer 2. The outputs of Hidden Layer 1 now act as the inputs. We dot product them with W<sup>(2)</sup> weights.',
                activeNodes: ['h1_1', 'h1_2', 'h1_3', 'h2_1'],
                activeEdges: ['h1_1-h2_1', 'h1_2-h2_1', 'h1_3-h2_1'],
                updates: { 'h2_1': '0.6240' }
            },
            {
                phase: 'forward',
                title: 'Step 5: Compute Hidden 2 Neuron 2',
                formula: 'z<sub>2</sub><sup>(2)</sup> = W<sub>2</sub><sup>(2)</sup> &middot; [h<sub>1</sub><sup>(1)</sup>, h<sub>2</sub><sup>(1)</sup>, h<sub>3</sub><sup>(1)</sup>]<br>h<sub>2</sub><sup>(2)</sup> = &sigma;(z<sub>2</sub><sup>(2)</sup>)',
                substituted: 'z<sub>2</sub><sup>(2)</sup> = 0.1 &times; 0.5548 + 0.5 &times; 0.5449 + 0.3 &times; 0.5769<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;= 0.0555 + 0.2725 + 0.1731 = 0.5011',
                result: 'h<sub>2</sub><sup>(2)</sup> = 0.6227',
                logic: 'Second neuron in Hidden Layer 2 computed using its respective connections from Layer 1.',
                activeNodes: ['h1_1', 'h1_2', 'h1_3', 'h2_2'],
                activeEdges: ['h1_1-h2_2', 'h1_2-h2_2', 'h1_3-h2_2'],
                updates: { 'h2_2': '0.6227' }
            },
            {
                phase: 'forward',
                title: 'Step 6: Compute Hidden 2 Neuron 3',
                formula: 'z<sub>3</sub><sup>(2)</sup> = W<sub>3</sub><sup>(2)</sup> &middot; [h<sub>1</sub><sup>(1)</sup>, h<sub>2</sub><sup>(1)</sup>, h<sub>3</sub><sup>(1)</sup>]<br>h<sub>3</sub><sup>(2)</sup> = &sigma;(z<sub>3</sub><sup>(2)</sup>)',
                substituted: 'z<sub>3</sub><sup>(2)</sup> = 0.4 &times; 0.5548 + 0.2 &times; 0.5449 + 0.1 &times; 0.5769<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;= 0.2219 + 0.1090 + 0.0577 = 0.3886',
                result: 'h<sub>3</sub><sup>(2)</sup> = 0.5959',
                logic: 'Third neuron of Hidden Layer 2 computed.',
                activeNodes: ['h1_1', 'h1_2', 'h1_3', 'h2_3'],
                activeEdges: ['h1_1-h2_3', 'h1_2-h2_3', 'h1_3-h2_3'],
                updates: { 'h2_3': '0.5959' }
            },
            {
                phase: 'forward',
                title: 'Step 7: Compute Output Neuron 1',
                formula: 'z<sub>1</sub><sup>(3)</sup> = W<sub>1</sub><sup>(3)</sup> &middot; [h<sub>1</sub><sup>(2)</sup>, h<sub>2</sub><sup>(2)</sup>, h<sub>3</sub><sup>(2)</sup>]<br>o<sub>1</sub> = &sigma;(z<sub>1</sub><sup>(3)</sup>)',
                substituted: 'z<sub>1</sub><sup>(3)</sup> = 0.6 &times; 0.6240 + 0.1 &times; 0.6227 + 0.3 &times; 0.5959<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;= 0.3744 + 0.0623 + 0.1788 = 0.6155',
                result: 'o<sub>1</sub> = 0.6491',
                logic: 'First final output prediction computed. The network is predicting 0.6491, but the target (y₁) is 1.0.',
                activeNodes: ['h2_1', 'h2_2', 'h2_3', 'o1'],
                activeEdges: ['h2_1-o1', 'h2_2-o1', 'h2_3-o1'],
                updates: { 'o1': '0.6491' }
            },
            {
                phase: 'forward',
                title: 'Step 8: Compute Output Neuron 2',
                formula: 'z<sub>2</sub><sup>(3)</sup> = W<sub>2</sub><sup>(3)</sup> &middot; [h<sub>1</sub><sup>(2)</sup>, h<sub>2</sub><sup>(2)</sup>, h<sub>3</sub><sup>(2)</sup>]<br>o<sub>2</sub> = &sigma;(z<sub>2</sub><sup>(3)</sup>)',
                substituted: 'z<sub>2</sub><sup>(3)</sup> = 0.2 &times; 0.6240 + 0.4 &times; 0.6227 + 0.5 &times; 0.5959<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;= 0.1248 + 0.2491 + 0.2980 = 0.6719',
                result: 'o<sub>2</sub> = 0.6619',

            // 1. Draw Edges and Weights
            networkData.edges.forEach(edge => {
                const srcNode = networkData.nodes.find(n => n.id === edge.src);
                const dstNode = networkData.nodes.find(n => n.id === edge.dst);

                const gEdge = document.createElementNS('http://www.w3.org/2000/svg', 'g');

                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', srcNode.x);
                line.setAttribute('y1', srcNode.y);
                line.setAttribute('x2', dstNode.x);
                line.setAttribute('y2', dstNode.y);
                line.setAttribute('id', `edge-${edge.id}`);
                line.setAttribute('class', 'edge');

                // Midpoint for the weight text
                const midX = (srcNode.x + dstNode.x) / 2;
                const midY = (srcNode.y + dstNode.y) / 2;

                const weightText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                weightText.setAttribute('x', midX);
                weightText.setAttribute('y', midY - 6);
                weightText.setAttribute('text-anchor', 'middle');
                weightText.setAttribute('id', `weight-${edge.id}`);
                weightText.setAttribute('class', 'edge-label');
                weightText.textContent = edge.w;

                gEdge.appendChild(line);
                gEdge.appendChild(weightText);
                svgEdges.appendChild(gEdge);
            });

            // 2. Draw Nodes
            networkData.nodes.forEach(node => {
                const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');

                // Circle
                const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                circle.setAttribute('cx', node.x);
                circle.setAttribute('cy', node.y);
                circle.setAttribute('r', 35);
                circle.setAttribute('fill', node.color);
                circle.setAttribute('id', `node-${node.id}`);
                circle.setAttribute('class', 'node');

                // Value Text
                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', node.x);
                text.setAttribute('y', node.y + 5);
                text.setAttribute('text-anchor', 'middle');
                text.setAttribute('id', `text-${node.id}`);
                text.setAttribute('class', 'node-text');
                text.textContent = node.val;

                const labelText = document.createElementNS('http://www.w3.org/2000/svg', 'text');

                labelText.setAttribute('class', 'node-label');

        function resetNetworkValues() {
            networkData.nodes.forEach(n => {
                const el = document.getElementById(`text-${n.id}`);
                if (el) el.textContent = n.val;
            });
            document.getElementById('text-loss').textContent = 'L = ?';
        }

        function updateNodeValuesUpTo(targetStep) {
            resetNetworkValues();
            for (let i = 0; i <= targetStep; i++) {
                if (stepsData[i].updates) {
                    for (const [nodeId, val] of Object.entries(stepsData[i].updates)) {
                        if (nodeId === 'loss') {
                            document.getElementById('text-loss').textContent = `L = ${val}`;
                        } else {
                            document.getElementById(`text-${nodeId}`).textContent = val;
                        }
                    }
                }
            }
        }

        function clearActiveStates() {
            document.querySelectorAll('.active').forEach(el => el.classList.remove('active'));
        }

        function applyActiveStates(stepData) {
            if (stepData.activeNodes) {
                stepData.activeNodes.forEach(id => {
                    const el = document.getElementById(`node-${id}`);
                    if (el) el.classList.add('active');
                });
            }
            if (stepData.activeEdges) {
                stepData.activeEdges.forEach(id => {
                    const edgeLine = document.getElementById(`edge-${id}`);
                    const weightTxt = document.getElementById(`weight-${id}`);
                    if (edgeLine) edgeLine.classList.add('active');
                    if (weightTxt) weightTxt.classList.add('active');
                });
            }
        }

        function renderCard(stepData) {
            card.classList.remove('visible');

            setTimeout(() => {
                document.getElementById('card-title').innerHTML = stepData.title;
                document.getElementById('card-formula').innerHTML = stepData.formula;
                document.getElementById('card-substituted').innerHTML = stepData.substituted;
                document.getElementById('card-result').innerHTML = stepData.result;
                document.getElementById('card-logic').innerHTML = stepData.logic;

                let activeNodesTxt = stepData.activeNodes && stepData.activeNodes.length > 0 ? `Active Nodes: ${stepData.activeNodes.join(', ')}` : '';
                document.getElementById('card-active-nodes').textContent = activeNodesTxt;

                document.getElementById('card-extra').innerHTML = stepData.extraHTML || '';

                card.className = `card ${stepData.phase} visible`;
            }, 50);
        }

        function updateUI() {
            if (currentStepIndex === -1) {
                stepCounter.textContent = `Step 0 / 21`;
                phaseLabel.textContent = "Ready";
                phaseLabel.style.color = "var(--text-main)";
                progressBar.style.width = "0%";
                clearActiveStates();
                resetNetworkValues();
                card.className = "card visible";
                document.getElementById('card-title').textContent = "Welcome";
                document.getElementById('card-formula').innerHTML = "Click 'Start' or 'Next' to begin the animation.";
                document.getElementById('card-substituted').innerHTML = "";
                document.getElementById('card-result').innerHTML = "";
                document.getElementById('card-active-nodes').textContent = "";
                document.getElementById('card-logic').innerHTML = "This will walk through a 4-layer neural network's forward pass, backpropagation, and weight update using the <b>multi-variable chain rule</b>.";
                document.getElementById('card-extra').innerHTML = "";
                return;
            }

            const stepData = stepsData[currentStepIndex];

            stepCounter.textContent = `Step ${currentStepIndex + 1} / 21`;
            progressBar.style.width = `${((currentStepIndex + 1) / 21) * 100}%`;

            if (stepData.phase === 'forward') {
                phaseLabel.textContent = "🔵 Forward Pass";
                phaseLabel.style.color = "#60a5fa";
            } else if (stepData.phase === 'backward') {
                phaseLabel.textContent = "🔴 Backward Pass";
                phaseLabel.style.color = "#fb923c";
            } else {
                phaseLabel.textContent = "🟢 Weight Update";
                phaseLabel.style.color = "#4ade80";
            }

            clearActiveStates();
            updateNodeValuesUpTo(currentStepIndex);
            applyActiveStates(stepData);
            renderCard(stepData);

            btnPrev.disabled = currentStepIndex <= 0;
            btnNext.disabled = currentStepIndex >= stepsData.length - 1;
        }

        // Controllers
        function stepNext() {
            if (currentStepIndex < stepsData.length - 1) {
                currentStepIndex++;
                updateUI();
            } else if (isPlaying) {
                pauseAnim();
            }
        }

        function stepPrev() {
            if (currentStepIndex > 0) {
                currentStepIndex--;
                updateUI();
            }
        }

        function playAnim() {
            if (currentStepIndex >= stepsData.length - 1) currentStepIndex = -1;
            isPlaying = true;
            btnPlay.style.display = 'none';
            btnPause.style.display = 'flex';
            stepNext();
            playInterval = setInterval(stepNext, 3500); // Slower interval (3.5s) to read complex math
        }

        function pauseAnim() {
            isPlaying = false;
            btnPlay.style.display = 'flex';
            btnPause.style.display = 'none';
            clearInterval(playInterval);
        }

        function resetAnim() {
            pauseAnim();
            currentStepIndex = -1;
            updateUI();
        }

        // Event Listeners
        btnPlay.addEventListener('click', playAnim);
        btnPause.addEventListener('click', pauseAnim);
        btnNext.addEventListener('click', () => { pauseAnim(); stepNext(); });
        btnPrev.addEventListener('click', () => { pauseAnim(); stepPrev(); });
        btnReset.addEventListener('click', resetAnim);

        // Initialize
        btnPause.style.display = 'none';
        initSVG();
        updateUI();

    </script>
</body>

</html>
